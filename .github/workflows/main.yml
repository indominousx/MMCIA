name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy with Ansible
        env:
          ENV_SECRET: ${{ secrets.ENV_FILE }}
          ANSIBLE_HOST_KEY_CHECKING: False
        run: |
          # Create .env file from secret safely
          echo "$ENV_SECRET" > .env
          
          # Verify .env was created
          if [ ! -s .env ]; then
            echo "Error: .env is empty! Did you add the ENV_FILE secret to GitHub?"
            exit 1
          fi

          # Create temporary inventory
          echo "[packright]" > inventory.ini
          echo "${{ secrets.SERVER_IP }} ansible_ssh_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini
          
          # Run playbook
          cd deployment/ansible
          ansible-playbook -i ../../inventory.ini playbook.yml
